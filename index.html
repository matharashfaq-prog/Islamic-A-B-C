<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic A-Z Learning with Voice</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded MT Bold', sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            overflow: hidden;
        }

        #app-container {
            text-align: center;
            padding: 20px;
            max-width: 800px;
            animation: fadeIn 0.5s ease-in-out;
        }

        #letter {
            font-size: 10rem;
            font-weight: bold;
            margin: 0;
            color: #FF5722;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        #word {
            font-size: 4rem;
            font-weight: bold;
            margin: 10px 0;
            color: #2E7D32;
        }

        #meaning {
            font-size: 1.8rem;
            color: #555555;
            margin-top: 20px;
            line-height: 1.5;
        }

        .hint {
            position: absolute;
            bottom: 30px;
            font-size: 1.2rem;
            color: #aaaaaa;
            animation: pulse 1.5s infinite;
        }

        /* Sound Icon Indicator */
        .sound-icon {
            font-size: 2rem;
            margin-top: 10px;
            display: inline-block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 0.9; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <h id="Dedicated To Bindia and AddulRehman">A</h>
        <h1 id="letter">A</h1>
        <h2 id="word">Allah</h2>
        <p id="meaning">The One and Only God, the Creator of everything.</p>
        <div class="sound-icon">🔊</div>
    </div>

    <div class="hint">Tap anywhere to hear and see the next letter! ✨</div>

    <script>
        const alphabetData = [
            { letter: "A", word: "Allah", meaning: "The One and Only God, the Creator of everything.", color: "#FF5722" },
            { letter: "B", word: "Bismillah", meaning: "meaning 'In the name of Allah' — what we say before we start anything!", color: "#E91E63" },
            { letter: "C", word: "Charity", meaning: "Giving to those in need and sharing what we have.", color: "#9C27B0" },
            { letter: "D", word: "Dua", meaning: "Talking to Allah and asking Him for blessings and help.", color: "#3F51B5" },
            { letter: "E", word: "Eman", meaning: "Having strong faith and believing in Allah in our hearts.", color: "#00BCD4" },
            { letter: "F", word: "Fard", meaning: "The important duties Allah asked us to do, like praying.", color: "#4CAF50" },
            { letter: "G", word: "Ghafoor", meaning: "Allah is The All-Forgiving, always ready to forgive us.", color: "#8BC34A" },
            { letter: "H", word: "Hajj", meaning: "The beautiful journey to the Holy Kaaba in Makkah.", color: "#FFC107" },
            { letter: "I", word: "Ihsan", meaning: "Doing our very best and doing good actions beautifully.", color: "#FF9800" },
            { letter: "J", word: "Jannah", meaning: "Paradise! The beautiful home of peace and rewards.", color: "#009688" },
            { letter: "K", word: "Kaaba", meaning: "The sacred house of Allah that Muslims face when they pray.", color: "#607D8B" },
            { letter: "L", word: "La ilaha illallah", meaning: "The beautiful declaration: There is no God except Allah.", color: "#795548" },
            { letter: "M", word: "Muhammad", meaning: "The final Messenger of Allah, who taught us kindness.", color: "#2196F3" },
            { letter: "N", word: "Niyyah", meaning: "The clean and good intention we make in our hearts.", color: "#9E9E9E" },
            { letter: "O", word: "Oasis of Peace", meaning: "Like the city of Madinah, full of love and safety.", color: "#E040FB" },
            { letter: "P", word: "Prophets", meaning: "The special guides sent by Allah to teach humanity.", color: "#00E676" },
            { letter: "Q", word: "Quran", meaning: "The holy book and literal words of Allah to guide us.", color: "#00B0FF" },
            { letter: "R", word: "Ramadan", meaning: "The blessed month of fasting, sharing, and reading Quran.", color: "#FF3D00" },
            { letter: "S", word: "Sadaqah", meaning: "A voluntary kindness or charity—even a smile is Sadaqah!", color: "#4D7300" },
            { letter: "T", word: "Taqwa", meaning: "Remembering Allah in everything we do and staying good.", color: "#651FFF" },
            { letter: "U", word: "Ummah", meaning: "The big, global family of Muslims all around the world.", color: "#00838F" },
            { letter: "V", word: "Virtue", meaning: "Having excellent manners, honesty, and treating others well.", color: "#C2185B" },
            { letter: "W", word: "Wudu", meaning: "Washing up with clean water to prepare beautifully for prayer.", color: "#1976D2" },
            { letter: "X", word: "Excellence", meaning: "Always doing our work and duties with high quality.", color: "#F57C00" },
            { letter: "Y", word: "Yaqeen", meaning: "Being 100% sure and trusting in Allah's beautiful plans.", color: "#388E3C" },
            { letter: "Z", word: "Zikr", meaning: "Remembering Allah by saying 'Alhamdulillah' and 'SubhanAllah'.", color: "#D32F2F" }
        ];

        let currentIndex = 0;

        const container = document.getElementById('app-container');
        const letterEl = document.getElementById('letter');
        const wordEl = document.getElementById('word');
        const meaningEl = document.getElementById('meaning');

        // Core Text-to-Speech Function
        function speakText(textToSay) {
            // Cancel any speech currently playing so it doesn't overlap
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(textToSay);
            
            // Kid-friendly speech settings
            utterance.rate = 0.85;  // Slightly slower so kids can understand clearly
            utterance.pitch = 1.15; // Slightly higher pitch to make it sound cheerful

            window.speechSynthesis.speak(utterance);
        }

        function handleScreenTransition() {
            const currentItem = alphabetData[currentIndex];

            // 1. Update text displays
            letterEl.textContent = currentItem.letter;
            wordEl.textContent = currentItem.word;
            meaningEl.textContent = currentItem.meaning;
            letterEl.style.color = currentItem.color;

            // 2. Refresh CSS entry animation
            container.style.animation = 'none';
            container.offsetHeight; 
            container.style.animation = 'fadeIn 0.4s ease-in-out';

            // 3. Trigger voice: Speaks "A... Allah"
            const phraseToSpeak = `${currentItem.letter}.... ${currentItem.word}`;
            speakText(phraseToSpeak);
        }

        // Initialize voice for the very first screen (Requires a user gesture on some modern browsers)
        document.body.addEventListener('click', () => {
            // Check if it's the initial tap or a step forward
            if (container.dataset.started === "true") {
                currentIndex = (currentIndex + 1) % alphabetData.length;
            } else {
                container.dataset.started = "true";
            }
            handleScreenTransition();
        });
    </script>
</body>
</html>
